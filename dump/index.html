<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You've been dumped on · Dumpr</title>
    <meta name="description" content="Someone dumped a list on you. Get Dumpr to receive it.">
    <style>
        :root {
            color-scheme: dark;
            --bg-start: #0d0d26;
            --bg-end: #2e1a52;
            --accent: #33bfff;
            --text: #fff;
            --muted: rgba(255, 255, 255, 0.65);
            --pill-bg: rgba(255, 255, 255, 0.08);
            --pill-border: rgba(255, 255, 255, 0.18);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            color: var(--text);
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 20px;
            text-align: center;
        }
        .card {
            max-width: 480px;
            width: 100%;
            background: var(--pill-bg);
            border: 1px solid var(--pill-border);
            border-radius: 28px;
            padding: 40px 28px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        h1 {
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 12px;
            letter-spacing: -0.02em;
        }
        p {
            font-size: 17px;
            color: var(--muted);
            margin: 0 0 24px;
            line-height: 1.45;
        }
        .cta {
            display: inline-block;
            padding: 14px 28px;
            border-radius: 999px;
            background: var(--accent);
            color: #0d0d26;
            font-weight: 600;
            text-decoration: none;
            font-size: 16px;
            transition: opacity 0.2s ease;
        }
        .cta:hover { opacity: 0.85; }
        .footer {
            margin-top: 24px;
            font-size: 13px;
            color: var(--muted);
        }
        .footer a { color: var(--muted); }
    </style>
</head>
<body>
    <main class="card">
        <h1>You've been dumped on</h1>
        <p>
            Someone sent you a list of things via Dumpr — a voice-fed inbox
            that turns one ramble into clean items in your reminders and
            calendar. Install Dumpr to open it.
        </p>
        <!-- TODO post App Store launch: replace href with the App Store listing URL,
             e.g. https://apps.apple.com/gb/app/dumpr/id<APP_ID>.
             The receiver's payload is in the URL's `p` query param — once
             they install the app and tap the link again, the universal-link
             handler decodes it into the review sheet automatically. -->
        <a class="cta" href="#">Get Dumpr on the App Store</a>
        <p class="footer">
            Already have Dumpr? <a href="dumpr://dump">Open the app directly</a>.
        </p>
    </main>
    <script>
        // If the user happens to have Dumpr installed but the universal-link
        // didn't fire (rare iOS edge case after a fresh install before the
        // AASA cache populates), give them a manual escape hatch via the
        // custom scheme. The page transition is fine either way.
        try {
            const params = new URLSearchParams(window.location.search);
            if (params.has('p')) {
                const v = params.get('v') || '1';
                const p = params.get('p');
                const customSchemeFallback = document.querySelector('a[href="dumpr://dump"]');
                if (customSchemeFallback) {
                    customSchemeFallback.href = `dumpr://dump?v=${encodeURIComponent(v)}&p=${encodeURIComponent(p)}`;
                }
            }
        } catch (_) {}
    </script>
</body>
</html>
